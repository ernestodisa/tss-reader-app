name = "folio-tts"
main = "src/index.ts"
compatibility_date = "2024-06-01"

# Cerrado al público: el tráfico de producción entra por /api/* del Pages
# (detrás de Access). Este worker queda solo como código fuente compartido y
# backend de desarrollo local (`wrangler dev`). Regla G de blindar-app-cloudflare.
# OJO: estas claves deben ir ANTES de cualquier tabla [[...]] — en TOML, una
# clave suelta después de una tabla pertenece a esa tabla y wrangler la ignora.
workers_dev = false
preview_urls = false

[[r2_buckets]]
binding = "TTS_CACHE"
bucket_name = "speechify-tts-cache"

# Optional TTS engine secrets — DO NOT put keys here. Set them with:
#   wrangler secret put ELEVENLABS_API_KEY
#   wrangler secret put OPENAI_API_KEY
# When a secret is absent, that engine reports enabled:false on GET /engines
# and a request for it returns 400 engine_not_configured. Edge needs no key.
# NOTA re-branding: bucket físico con datos de producción; ver nota en ../wrangler.toml
