name = "speechify-tts"
main = "src/index.ts"
compatibility_date = "2024-06-01"

[[r2_buckets]]
binding = "TTS_CACHE"
bucket_name = "speechify-tts-cache"

# Optional TTS engine secrets — DO NOT put keys here. Set them with:
#   wrangler secret put ELEVENLABS_API_KEY
#   wrangler secret put OPENAI_API_KEY
# When a secret is absent, that engine reports enabled:false on GET /engines
# and a request for it returns 400 engine_not_configured. Edge needs no key.
